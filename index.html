<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESEARCH LOG / 課題研究日誌</title>
    <style>
        /* サイバー・開発ログ風のカラーパレット */
        :root {
            --bg-main: #0d1117;       /* GitHubダーク */
            --bg-card: #161b22;       /* カード背景 */
            --accent-neon: #38bdf8;   /* 鮮やかなライトブルー */
            --accent-purple: #a855f7; /* アクセントパープル */
            --text-primary: #f8fafc;  /* メイン文字 */
            --text-muted: #94a3b8;     /* サブ文字 */
            --border-color: #334155;  /* 境界線 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.8;
            padding-bottom: 80px;
        }

        /* 上部のグラデーションライン */
        .top-bar {
            height: 4px;
            background: linear-gradient(90deg, var(--accent-neon), var(--accent-purple));
            width: 100%;
        }

        /* ナビゲーションバー */
        .navbar {
            background-color: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 2px;
            font-family: monospace;
        }

        .nav-logo span {
            color: var(--accent-neon);
        }

        .status-badge {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--accent-neon);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--accent-neon);
            font-family: monospace;
        }

        /* メイン容器 */
        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* ヘッダーエリア */
        .header-area {
            text-align: center;
            padding: 40px 0;
            margin-bottom: 40px;
        }

        .header-area h1 {
            font-size: 2.3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-area p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* ==========================================
           タイムライン（日誌）のコアデザイン
        ========================================== */
        .timeline {
            position: relative;
            border-left: 2px solid var(--border-color); /* 中央を走る縦線 */
            padding-left: 30px;
            margin-left: 10px;
        }

        /* 日誌の1ブロック */
        .log-item {
            position: relative;
            margin-bottom: 40px;
        }

        /* タイムラインの「点」 */
        .log-item::before {
            content: "";
            position: absolute;
            left: -41px; /* 縦線の上にぴったり重ねる調整 */
            top: 24px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: var(--bg-main);
            border: 4px solid var(--accent-neon);
            z-index: 1;
            transition: background-color 0.3s;
        }

        /* 最新の日誌の点だけ色を変えて目立たせる */
        .log-item.latest::before {
            border-color: var(--accent-purple);
            box-shadow: 0 0 10px var(--accent-purple);
        }

        /* 日誌のカード */
        .log-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .log-card:hover {
            border-color: var(--accent-neon);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.1);
        }

        .log-item.latest .log-card:hover {
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.1);
        }

        /* 日誌のヘッダー（日付とタグ） */
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        .log-date {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }

        /* 最新ログ用のバッジ */
        .latest-tag {
            background: linear-gradient(45deg, var(--accent-purple), #ec4899);
            color: #fff;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
        }

        .log-title {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 10px;
            font-weight: 600;
        }

        /* 日誌内の箇条書きやテキスト */
        .log-body p {
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .log-body ul {
            list-style: none;
            padding-left: 5px;
        }

        .log-body ul li {
            position: relative;
            padding-left: 18px;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 6px;
        }

        .log-body ul li::before {
            content: ">";
            position: absolute;
            left: 0;
            color: var(--accent-neon);
            font-family: monospace;
            font-weight: bold;
        }

        /* フッター */
        footer {
            text-align: center;
            margin-top: 80px;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="top-bar"></div>

    <div class="navbar">
        <div class="nav-logo">RESEARCH_<span>LOG</span></div>
        <div class="status-badge">STATUS: ACTIVE</div>
    </div>

    <div class="container">

        <div class="header-area">
            <h1>課題研究 活動日誌</h1>
            <p>千葉県立市川工業高等学校 4班 / 活動報告</p>
        </div>

        <div class="timeline">

            <div class="log-item latest">
                <div class="log-card">
                    <div class="log-header">
                        <div class="log-date">2026.05.28</div>
                        <div class="log-date">2026.06.10</div>
                        <div class="latest-tag">LATEST LOG</div>
                    </div>
                    <div class="log-title">機材の選定</div>
